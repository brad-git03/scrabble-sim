<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Scrabble Recorder & Adjudicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="board"></div>

<div id="sidebar">
    <div class="panel">
        <div class="score-card">
            <div id="box-1" class="player-box active-p1">
                <input type="text" id="p1Name" class="name-input" value="Player 1">
                <div id="s1" style="font-size: 24px; font-weight: 900;">0</div>
            </div>
            <div id="box-2" class="player-box">
                <input type="text" id="p2Name" class="name-input" value="Player 2">
                <div id="s2" style="font-size: 24px; font-weight: 900;">0</div>
            </div>
            <div id="box-3" class="player-box">
                <input type="text" id="p3Name" class="name-input" value="Player 3">
                <div id="s3" style="font-size: 24px; font-weight: 900;">0</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-switch" onclick="switchPlayer()">Switch Turn</button>
            <button class="btn-score" onclick="calculateTurn()">Score Move</button>
        </div>
        
        <button onclick="undoLastMove()" style="width: 100%; margin-top: 8px; background: #e74c3c; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Undo Last Move</button>
        
        <div class="log" id="gameLog"></div>
    </div>

    <div class="panel">
        <h3 style="margin-top:0">Tile Generator</h3>
        <span class="hint">Use <b>UPPERCASE</b> for normal tiles.<br>Use <b>lowercase</b> for blanks (e.g. "cAT").</span>
        <input type="text" id="tileInput" placeholder="Type letters..." oninput="generateTiles()">
        <div id="rack"></div>
        <span class="hint" style="margin-top: 5px; text-align: center;">*Double-tap a placed tile to remove it.</span>
    </div>

    <div class="panel">
        <h3 style="margin-top:0; color: #f1c40f;">Dictionary Challenge</h3>
        <input type="text" id="checkWordInput" placeholder="Enter word (lowercase for blanks)">
        <button class="btn-check" onclick="checkDictionary()">Check Validity & Base Points</button>
        <div id="dictResult"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
